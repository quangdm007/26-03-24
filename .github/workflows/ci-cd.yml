name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: 
jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Copy .env file
        run: |
          cp /opt/aum_web/training/26_03_24/headless_wrapper/.env \
             $GITHUB_WORKSPACE/headless_wrapper/.env
      - name: Deploy
        run: |
          cd headless_wrapper
          docker compose -f compose.yaml down
          docker compose -f compose.yaml up -d --build
          docker image prune -f
